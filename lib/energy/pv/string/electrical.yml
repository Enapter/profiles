blueprint_spec: profile/1.0

display_name: PV String Electrical Measurements
description: Voltage, current, and power measurements for a single PV MPPT string.

telemetry:
  pv_string_voltage:
    display_name: PV String Voltage
    type: float
    unit: V
    description: DC voltage of the solar panel string.

  pv_string_current:
    display_name: PV String Current
    type: float
    unit: A
    description: DC current of the solar panel string.

  pv_string_power:
    display_name: PV String Power
    type: float
    unit: W
    description: DC power of the solar panel string.
