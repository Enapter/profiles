blueprint_spec: profile/1.0

display_name: PV Daily Energy
description: PV energy production since the start of the current day.

telemetry:
  pv_energy_daily:
    display_name: PV Daily Energy
    type: float
    unit: Wh
    description: Energy generated by all PV strings since the start of the current day. Day boundary is determined by the timezone configured on the device.
