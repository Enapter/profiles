blueprint_spec: profile/1.0

display_name: Battery Electrical Measurements
description: Voltage, current, and power measurements for battery inverters, charge controllers, and battery management systems.

telemetry:
  battery_voltage:
    display_name: Battery Voltage
    type: float
    unit: V
    description: Current DC voltage of the battery bank.

  battery_current:
    display_name: Battery Current
    type: float
    unit: A
    description: Current DC current flow to/from the battery bank (positive for charge, negative for discharge).

  battery_power:
    display_name: Battery Power
    type: float
    unit: W
    description: Current DC power (positive for discharge, negative for charge).
