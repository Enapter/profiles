blueprint_spec: profile/1.0

display_name: Charge Controller Status
description: Operational status for PV charge controllers (MPPT and PWM).

telemetry:
  charge_controller_status:
    display_name: Charge Controller Status
    type: string
    description: Current operational status of the charge controller.
    enum:
      idle:
        display_name: Idle
        description: >
          Charge controller is powered and ready to operate but is not
          managing power conversion. It will not start until commanded
          by a user or a rule.
      standby:
        display_name: Standby
        description: >
          Charge controller is not converting power but will autonomously
          resume operation when conditions are met. No command is required.
          Examples: insufficient PV irradiance (night time), battery fully
          charged with no load.
      starting:
        display_name: Starting
        description: >
          Charge controller is executing its startup sequence. This
          includes PV input detection, MPPT initialization, and battery
          compatibility checks. Power conversion has not yet begun.
      operating:
        display_name: Operating
        description: >
          Charge controller is actively managing power conversion from
          PV input to battery. The actual charge mode is reported in
          battery_charge_status.
      throttled:
        display_name: Throttled
        description: >
          Charge controller is operating at reduced power output due to
          an external constraint or internal condition such as high
          temperature, battery voltage limits, or input overvoltage.
      stopping:
        display_name: Stopping
        description: >
          Charge controller is executing a controlled stop sequence.
          It will reach idle or standby when the sequence completes.
      fault:
        display_name: Fault
        description: >
          Charge controller has detected a condition that prevents normal
          operation. Operator attention is required before the device
          can resume.
      maintenance:
        display_name: Maintenance
        description: >
          Charge controller is in a maintenance or configuration mode.
          Normal operation has been suspended by an operator and will not
          resume until the operator exits this mode.
