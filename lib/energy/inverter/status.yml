blueprint_spec: profile/1.0

display_name: Inverter Status
description: Operational status for battery, solar, and hybrid inverters.

telemetry:
  inverter_status:
    display_name: Inverter Status
    type: string
    description: Current operational status of the inverter.
    enum:
      idle:
        display_name: Idle
        description: >
          Inverter is powered and ready to operate but is not converting power.
          It will not start until commanded by a user or a rule.
      standby:
        display_name: Standby
        description: >
          Inverter is not converting power but will autonomously resume
          operation when conditions are met. No command is required.
          Examples: DC voltage too low (night time for PV inverters),
          AC grid voltage unavailable for grid-tied inverters.
      starting:
        display_name: Starting
        description: >
          Inverter is executing its startup sequence. This includes
          grid synchronization, self-tests, and ramp-up. Power conversion
          has not yet reached nominal operation.
      operating:
        display_name: Operating
        description: >
          Inverter is actively converting power at its operating setpoint.
      throttled:
        display_name: Throttled
        description: >
          Inverter is operating at reduced power output due to an external
          constraint or internal condition such as high temperature, grid
          frequency response, or power curtailment.
      stopping:
        display_name: Stopping
        description: >
          Inverter is executing a controlled stop sequence, including grid
          disconnection and ramp-down. It will reach idle or standby when
          the sequence completes.
      fault:
        display_name: Fault
        description: >
          Inverter has detected a condition that prevents normal operation.
          Operator attention is required before the device can resume.
      maintenance:
        display_name: Maintenance
        description: >
          Inverter is in a maintenance or configuration mode. Normal
          operation has been suspended by an operator and will not resume
          until the operator exits this mode.
