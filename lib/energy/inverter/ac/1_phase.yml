blueprint_spec: profile/1.0

display_name: Single Phase Inverter
description: Provides AC measurements for a single-phase inverter.

telemetry:
  ac_frequency:
    display_name: AC Frequency
    type: float
    unit: Hz
    description: AC grid frequency.

  ac_l1_power:
    display_name: AC Power
    type: float
    unit: W
    description: AC power on phase L1.

  ac_l1_voltage:
    display_name: AC Voltage
    type: float
    unit: V
    description: Voltage on phase L1 to neutral.

  ac_l1_current:
    display_name: AC Current
    type: float
    unit: A
    description: Current on phase L1.
