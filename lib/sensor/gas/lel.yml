blueprint_spec: profile/1.0

display_name: Gas concentration in %LEL
description: Indicates the ability to measure gas concentration in %LEL (Lower Explosive Limit).

telemetry:
  gas_lel:
    display_name: Gas Percent of Lower Explosive Limit (%LEL)
    type: float
    unit: '%LEL'
    description: Lower explosive limit (LEL) is the lowest concentration of gas that can ignite in air. 100% LEL indicates the concentration of gas is explosive, while 0% LEL indicates no gas is present.
