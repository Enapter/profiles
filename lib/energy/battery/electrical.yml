blueprint_spec: profile/1.0

display_name: Battery Electrical Measurements
description: Voltage, current, and power measurements for battery inverters, charge controllers, and battery management systems.

telemetry:
  battery_voltage:
    display_name: Battery Voltage
    type: float
    unit: V
    description: Current DC voltage of the battery bank.

  battery_current:
    display_name: Battery Current
    type: float
    unit: A
    description: DC current flow to/from the battery bank. Positive values indicate discharging (current flowing out of battery), negative values indicate charging (current flowing into battery).

  battery_power:
    display_name: Battery Power
    type: float
    unit: W
    description: DC power to/from the battery bank. Positive values indicate discharging (power delivered to system), negative values indicate charging (power absorbed from system).
