blueprint_spec: profile/1.0

display_name: 4-String PV Generation
description: Measurements for PV inverters/charge controllers with four MPPT strings.

telemetry:
  # String 1
  pv_s1_voltage:
    display_name: PV String 1 Voltage
    type: float
    unit: V
    description: DC voltage of the solar panel string 1.

  pv_s1_current:
    display_name: PV String 1 Current
    type: float
    unit: A
    description: DC current of the solar panel string 1.

  pv_s1_power:
    display_name: PV String 1 Power
    type: float
    unit: W
    description: DC power of the solar panel string 1.

  # String 2
  pv_s2_voltage:
    display_name: PV String 2 Voltage
    type: float
    unit: V
    description: DC voltage of the solar panel string 2.

  pv_s2_current:
    display_name: PV String 2 Current
    type: float
    unit: A
    description: DC current of the solar panel string 2.

  pv_s2_power:
    display_name: PV String 2 Power
    type: float
    unit: W
    description: DC power of the solar panel string 2.

  # String 3
  pv_s3_voltage:
    display_name: PV String 3 Voltage
    type: float
    unit: V
    description: DC voltage of the solar panel string 3.

  pv_s3_current:
    display_name: PV String 3 Current
    type: float
    unit: A
    description: DC current of the solar panel string 3.

  pv_s3_power:
    display_name: PV String 3 Power
    type: float
    unit: W
    description: DC power of the solar panel string 3.

  # String 4
  pv_s4_voltage:
    display_name: PV String 4 Voltage
    type: float
    unit: V
    description: DC voltage of the solar panel string 4.

  pv_s4_current:
    display_name: PV String 4 Current
    type: float
    unit: A
    description: DC current of the solar panel string 4.

  pv_s4_power:
    display_name: PV String 4 Power
    type: float
    unit: W
    description: DC power of the solar panel string 4.
