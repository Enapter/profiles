blueprint_spec: profile/1.0

display_name: Gas concentration in %LEL
description: Indicates the ability to measure gas concentration in %LEL (Lower Explosive Limit).

telemetry:
  gas_lel:
    display_name: Gas Percent of Lower Explosive Limit (%LEL)
    type: float
    unit: '%LEL'
    description: Gas concentration as a percentage of the Lower Explosive Limit (LEL) - the minimum concentration at which the gas can ignite in air. 0% LEL indicates no gas is present. At 100% LEL the gas has reached the ignition threshold; concentrations above this are within the explosive range up to the Upper Explosive Limit (UEL).
