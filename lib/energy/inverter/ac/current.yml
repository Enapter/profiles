blueprint_spec: profile/1.0

display_name: Total AC Current
description: Provides total AC current measurement across all phases.

telemetry:
  ac_total_current:
    display_name: AC Current
    type: float
    unit: A
    description: Total AC current across all phases. Positive values indicate current flowing out to grid/loads, negative values indicate current flowing in, e.g. for charging batteries.
